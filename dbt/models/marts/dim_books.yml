version: 2

models:
  - name: dim_books
    description: >
      Central dimension table joining books, categories, and inventory.
      One row per book. This is the primary input for all mart aggregations.
    columns:
      - name: book_title
        description: "Primary key"
        tests:
          - not_null
          - unique

      - name: category_id
        description: "FK to stg_categories — tested with a relationships test"
        tests:
          - not_null
          - relationships:
              to: ref('stg_categories')
              field: category_id

      - name: rating_stars
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]

      - name: upc
        description: "May be null if the detail page scrape failed for a book"
        tests:
          - unique

      - name: stock_status
        tests:
          - accepted_values:
              values: ['Available', 'Low Stock', 'Out of Stock']

      - name: description
        description: "Product description from the book detail page. NULL if absent. Primary input for Cortex Search semantic indexing."
